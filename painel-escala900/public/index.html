<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Prospecção - Escala 900</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="pulse"></span>
                <h1>Escala 900</h1>
            </div>
            <p>Varredura Inteligente & Extração de Leads</p>
        </header>

        <main class="dashboard">
            <section class="config-panel glass-panel">
                <h2>Configuração da Varredura</h2>
                <form id="extraction-form">
                    <div class="input-group">
                        <label for="niche">Nicho / Palavra-chave</label>
                        <input type="text" id="niche" placeholder="ex: Podólogo, Clínica de Estética" required>
                    </div>

                    <div class="input-group">
                        <label for="city">Localização / Cidade</label>
                        <input type="text" id="city" placeholder="ex: Campinas, São Paulo" required>
                    </div>

                    <div class="input-group">
                        <label for="limit">Quantidade Max. de Leads</label>
                        <select id="limit">
                            <option value="20">20 Leads</option>
                            <option value="40">40 Leads</option>
                            <option value="60">60 Leads</option>
                        </select>
                    </div>

                    <button type="submit" id="start-btn" class="btn-primary">
                        <span class="btn-text">Iniciar Extração</span>
                        <div class="loader" style="display: none;"></div>
                    </button>
                </form>
            </section>

            <section class="logs-panel glass-panel">
                <div class="logs-header">
                    <h2>Log em Tempo Real</h2>
                    <span id="status-badge" class="badge idle">Aguardando</span>
                </div>
                <div class="terminal" id="log-terminal">
                    <div class="log-entry system">Sistema pronto para iniciar.</div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
